kind = "data-app"
previewPath = "/"
title = "Customer Churn Analysis"
version = "1.0.0"
id = "artifacts/churn-analysis"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20847

[services.development]
run = "pnpm --filter @workspace/churn-analysis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/churn-analysis", "run", "build" ]
publicDir = "artifacts/churn-analysis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20847"
BASE_PATH = "/"
